<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>

    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid p-0">
    <div class="row g-0">

        <!-- Sidebar -->
        <aside class="sidebar p-4">

            <h3 class="text-white fw-bold mb-5">
                <i class="fa-brands fa-spotify text-success"></i>
                Spotify
            </h3>

            <nav class="nav flex-column gap-3">

                <a href="landing.html" class="nav-link fw-semibold">
                    <i class="fa-solid fa-house me-3"></i>Home
                </a>

                <a href="search.html" class="nav-link fw-semibold">
                    <i class="fa-solid fa-magnifying-glass me-3"></i>Search
                </a>

                <a href="library.html" class="nav-link fw-semibold">
                    <i class="fa-solid fa-book me-3"></i>Your Library
                </a>

            </nav>

        </aside>

        <!-- Main Content -->
        <main class="maincontent">

            <!-- Top Bar -->
            <header class="top-bar d-flex justify-content-between align-items-center px-4 py-3">

                <div class="d-flex align-items-center justify-content-between">
                    <a href="upgrade.html" class="upgrade">Upgrade</a>
                    <button class="profile rounded-circle">JD</button>
                </div>

            </header>

            <!-- Hero Section -->
            <section id="home" class="hero-section">

                <h1 class="display-3 fw-bold">
                    Feel Every Beat 🎵
                </h1>

                <p class="lead mt-3">
                    Discover millions of songs, create playlists, and enjoy music without limits.
                </p>

                <button class="btn btn-success btn-lg mt-3">
                    Start Listening
                </button>

            </section>


        </main>

    </div>
</div>

<!-- Music Player -->
<footer class="player fixed-bottom">

    <i class="fa-solid fa-backward-step"></i>

    <button type="button"
        class="btn btn-success"
        onclick="document.getElementById('clickSound').play()">

        <i class="fa-solid fa-circle-play fs-3"></i>

    </button>

    <i class="fa-solid fa-forward-step"></i>

    <small id="currentTime">0:00</small>

    <input
        type="range"
        id="progress"
        value="0"
        min="0"
        max="100"
        class="form-range progress-slider">

    <small id="duration">5:00</small>

    <audio id="clickSound">
        <source src="./assets/audio/Innisai.mp3" type="audio/mpeg">
    </audio>

</footer>

<script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
