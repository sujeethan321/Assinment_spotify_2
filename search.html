<div class="player fixed-bottom d-flex justify-content-center align-items-center gap-4 text-white">
    <i class="fa-solid fa-backward-step"></i>
    <button class="btn btn-primary" classs="playbutton" onclick="document.getElementById('clickSound').play()"><i class="fa-solid fa-circle-play fs-7"></i>play</button>
    <i class="fa-solid fa-forward-step"></i>


     <!-- Current Time -->

           id="progress"

           max="100"
           class="form-range w-25">

    <!-- Duration -->

    <!-- Audio Element -->
<audio id="clickSound">
  <source src="./assets/audio/Innisai.mp3" type="audio/mpeg">
</audio>
